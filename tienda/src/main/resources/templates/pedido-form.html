<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg,#0A0A0F,#1A1A2E,#7B61FF);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .tarjeta{
            display: block;
            background: #FFFFFF;
            text-align: center;
            border-radius: 24px;
            padding: 35px 30px;
        }


        h1 {
            margin-bottom: 20px;
        }

        form {
            width: 100%;
        }

        .campo {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        .acciones {
            margin-top: 15px;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-guardar {
            background: linear-gradient(135deg,#4F3BCC, #7B61FF);
            color: white;
        }

        .btn-volver {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="tarjeta">
        <h1 th:text="${modoEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></h1>

        <form th:action="${modoEdicion} ? @{/pedido/actualizar/{id}(id=${pedido.idPedido})} : @{/pedido/guardar}"
        th:object="${pedido}"
        method="post">

            <div class="campo">
                <label for="fechaPedido">Fecha Pedido</label>
                <input type="date" id="fechaPedido" th:field="*{fechaPedido}">
                <div class="error"
                     th:if="${#fields.hasErrors('fechaPedido')}"
                     th:errors="*{fechaPedido}"></div>
            </div>

            <div class="campo">
                <label for="totalPedido">Total Pedido</label>
                <input type="number" id="totalPedido" th:field="*{totalPedido}" step="0.01">
                <div class="error"
                     th:if="${#fields.hasErrors('totalPedido')}"
                     th:errors="*{totalPedido}"></div>
            </div>

            <div class="campo">
                <label for="idUsuario">ID Usuario</label>
                <input type="number" id="idUsuario" th:field="*{idUsuario}">
                <div class="error"
                     th:if="${#fields.hasErrors('idUsuario')}"
                     th:errors="*{idUsuario}"></div>
            </div>

            <div class="acciones">
                <button type="submit"
                        class="btn btn-guardar"
                        th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>

                <a th:href="@{/pedido}" class="btn btn-volver">Volver</a>
            </div>


        </form>
    </div>
</div>

</body>
</html>
