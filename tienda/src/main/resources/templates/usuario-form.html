<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg,#0A0A0F,#1A1A2E,#7B61FF);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .tarjeta{
            display: block;
            background: #FFFFFF;
            text-align: center;
            border-radius: 24px;
            padding: 35px 30px;
        }


        h1 {
            margin-bottom: 20px;
        }

        form {
            width: 100%;
        }

        .campo {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        .acciones {
            margin-top: 15px;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-guardar {
            background: linear-gradient(135deg,#4F3BCC, #7B61FF);
            color: white;
        }

        .btn-volver {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="tarjeta">
        <h1 th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></h1>

        <form th:action="${modoEdicion} ? @{/usuarios/actualizar/{id}(id=${usuarios.idUsuario})} : @{/usuarios/guardar}"
              th:object="${usuarios}"
              method="post">

            <div class="campo">
                <label for="nombreUsuario">Nombre</label>
                <input type="text" id="nombreUsuario" th:field="*{nombreUsuario}">
                <div class="error"
                     th:if="${#fields.hasErrors('nombreUsuario')}"
                     th:errors="*{nombreUsuario}"></div>
            </div>

            <div class="campo">
                <label for="apellidoUsuario">Apellido</label>
                <input type="text" id="apellidoUsuario" th:field="*{apellidoUsuario}">
                <div class="error"
                     th:if="${#fields.hasErrors('apellidoUsuario')}"
                     th:errors="*{apellidoUsuario}"></div>
            </div>

            <div class="campo">
                <label for="edadUsuario">Edad</label>
                <input type="number" id="edadUsuario" th:field="*{edadUsuario}">
                <div class="error"
                     th:if="${#fields.hasErrors('edadUsuario')}"
                     th:errors="*{edadUsuario}"></div>
            </div>

            <div class="campo">
                <label for="correoUsuario">Correo</label>
                <input type="email" id="correoUsuario" th:field="*{correoUsuario}">
                <div class="error"
                     th:if="${#fields.hasErrors('correoUsuario')}"
                     th:errors="*{correoUsuario}"></div>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" th:field="*{passwordUsuario}" value="{(ps=${usuario.passwordUsuario})}">
                <div class="error"
                     th:if="${#fields.hasErrors('passwordUsuario')}"
                     th:errors="*{passwordUsuario}"></div>
            </div>

            <div class="campo">
                <label for="rolUsuario">Rol</label>
                <input type="hidden" id="rolUsuario" th:field="*{rolUsuario}" th:value="${T(com.carlosbarahona.tienda.enumtypes.UserType).USUARIO}">
                <input type="text" value="USUARIO" disabled>
            </div>

            <div class="acciones">
                <button type="submit"
                        class="btn btn-guardar"
                        th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>

                <a th:href="@{/usuarios}" class="btn btn-volver">Volver</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
