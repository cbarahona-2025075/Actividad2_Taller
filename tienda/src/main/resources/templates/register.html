<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg,#0A0A0F,#1A1A2E,#7B61FF);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .tarjeta{
            display: block;
            background: #FFFFFF;
            text-align: center;
            border-radius: 24px;
            padding: 35px 30px;
        }


        h1 {
            margin-bottom: 20px;
        }

        form {
            width: 100%;
        }

        .campo {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        .acciones {
            margin-top: 15px;
        }

        .boton {
            display: block;
            width: 100%;
            padding: 14px 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg,#4F3BCC, #7B61FF);
            text-decoration: none;
            color: white;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
            margin-top: 10px;
            cursor: pointer;
        }

        .mensaje-error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="tarjeta">
        <h1 class="titulo">Crea una cuenta</h1>
        <p class="subtitulo">Ingresa los datos solicitas para registrarse</p>

        <div th:if="${errorRegistro}" class="mensaje-error" th:text="${errorRegistro}"></div>

        <div th:if="${errores}">
            <div th:each="error:${errores}" class="mensaje-error" th:text="${error.defaultMessage}"></div>
        </div>

        <form th:action="@{/register}" method="post">

            <div class="campo">
                <label for="nombreUsuario">Nombre Usuario</label>
                <input type="text" id="nombreUsuario" name="nombreUsuario" placeholder="Ingresa tu nombre de usuario" required>
            </div>

            <div class="campo">
                <label for="apellidoUsuario">Apellido Usuario</label>
                <input type="text" id="apellidoUsuario" name="apellidoUsuario" placeholder="Ingresa tu apellido de usuario" required>
            </div>

            <div class="campo">
                <label for="edadUsuario">Edad Usuario</label>
                <input type="number" id="edadUsuario" name="edadUsuario" placeholder="Ingresa tu edad" required>
            </div>

            <div class="campo">
                <label for="correoUsuario">Correo Usuario</label>
                <input type="email" id="correoUsuario" name="correoUsuario" placeholder="Ingresa tu correo de usuario" required>
            </div>

            <div class="campo">
                <label for="passwordUsuario">Contraseña Usuario</label>
                <input type="password" id="passwordUsuario" name="passwordUsuario" placeholder="Ingresa tu contraseña">
            </div>

            <div class="acciones">
                <button type="submit" class="boton">Registrarse</button>
            </div>

        </form>
        <a th:href="@{/login}" class="boton">Volver a Login</a>
    </div>
</div>

</body>
</html>
